services:
  - type: web
    name: erpveterinaria
    env: node
    plan: starter
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PRODUCTION
        value: false
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_SECRET
        generateValue: true
      - key: SAAS_SUPER_SECRET
        generateValue: true
      # Clave de "Acceso de emergencia" del panel administrativo SaaS.
      # Render la genera; leela en el tab Environment del servicio para iniciar sesion.
      - key: SAAS_ADMIN_SECRET
        generateValue: true
      # Debe incluir el origen del panel admin: https://erpveterinaria-admin.onrender.com
      - key: ALLOWED_ORIGINS
        sync: false

  # Panel administrativo del SaaS (super-admin para gestionar veterinarias).
  # En el Blueprint de Render un sitio estatico es type: web + runtime: static
  # (no existe type: static).
  - type: web
    runtime: static
    name: erpveterinaria-admin
    rootDir: apps/Erpveterinaria-admin
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 20
      # URL del backend en produccion (sin barra final, sin /api).
      # El cliente agrega /api/saas/... El backend debe incluir el origen de
      # este panel en ALLOWED_ORIGINS.
      - key: VITE_API_URL
        value: https://veterinaria.solutechonduras.com
